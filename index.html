
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;}
#app{max-width:860px;margin:0 auto;}
.hdr{background:#F47920;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;border-radius:12px 12px 0 0;}
.logo{width:36px;height:36px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#F47920;}
.bod{background:#fff;border:1px solid #e0d8d0;border-top:none;border-radius:0 0 12px 12px;padding:20px;}
.sc{display:none;}.sc.on{display:block;}
.btn{border:1px solid #F47920;border-radius:8px;padding:9px 18px;font-size:14px;cursor:pointer;background:transparent;color:#F47920;font-family:inherit;}
.btn:hover,.btn-s{background:#F47920;color:#fff;}
.btn-s{border-color:#F47920;}.btn-s:hover{background:#d4661a;}
.btn-lg{padding:13px 28px;font-size:16px;font-weight:600;}
.ww{display:flex;flex-direction:column;align-items:center;gap:12px;}
.rc{border:2px solid #F47920;border-radius:10px;padding:20px;margin-top:16px;background:#fff8f3;}
.tb{font-size:11px;background:#F47920;color:#fff;border-radius:6px;padding:3px 10px;display:inline-block;margin-bottom:10px;font-weight:600;}
.rq{font-size:19px;font-weight:600;color:#2a1a0a;line-height:1.4;margin-bottom:14px;}
.ob{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 14px;font-size:15px;text-align:left;cursor:pointer;background:#fff;color:#2a1a0a;font-family:inherit;margin-bottom:6px;display:block;}
.ob:hover{border-color:#F47920;background:#fff3ec;}
.ob.ok{background:#f0f9e8;border-color:#8FAF2A;color:#4a6010;font-weight:600;}
.ob.no{background:#fdecea;border-color:#c0392b;color:#7a1a14;}
.ob:disabled{cursor:default;}
.ab{background:#f0f9e8;border:1px solid #8FAF2A;border-radius:8px;padding:12px 16px;color:#4a6010;font-size:15px;font-weight:600;margin-top:10px;display:none;}
.bb{margin-top:12px;background:#fff8e1;border:2px solid #E8A731;border-radius:8px;padding:12px 16px;text-align:center;font-size:15px;font-weight:600;color:#7a5200;display:none;}
.nw{margin-top:16px;display:none;}
.qr{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f0e8e0;}
.qa{font-size:11px;background:#f0f9e8;color:#4a6010;border-radius:4px;padding:2px 6px;margin-top:2px;display:inline-block;}
.qt{font-size:11px;background:#fff3ec;color:#c05a10;border-radius:4px;padding:2px 6px;margin-top:2px;display:inline-block;margin-left:3px;}
</style>

<div id="app">
  <div class="hdr">
    <div class="logo">S</div>
    <div>
      <div style="font-size:17px;font-weight:600;">Quiz Projeto Sucuriú</div>
      <div style="font-size:12px;opacity:0.88;">Arauco — Formação de Motoristas</div>
    </div>
  </div>
  <div class="bod">
    <div id="ss" class="sc on">
      <div style="margin-bottom:14px;">
        <button class="btn btn-s btn-lg" onclick="startWheel()">Iniciar roleta</button>
      </div>
      <div id="ql"></div>
    </div>
    <div id="sw" class="sc">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-size:16px;font-weight:600;color:#2a1a0a;">Roleta Sucuriú</div>
        <button class="btn" style="font-size:12px;padding:6px 12px;" onclick="goSetup()">← Editar</button>
      </div>
      <div class="ww">
        <!-- Seta à DIREITA, simples e fixa -->
        <div style="display:flex;align-items:center;gap:0;">
          <canvas id="wc" width="360" height="360"></canvas>
          <div style="font-size:28px;color:#222;margin-left:-4px;">◀</div>
        </div>
        <button id="sb" class="btn btn-s btn-lg" onclick="spin()">Girar!</button>
      </div>
      <div id="ra"></div>
    </div>
  </div>
</div>

<script>
// SETA FIXA À DIREITA = ângulo 0 no canvas
// Fatia i ocupa [angle + i*SLICE, angle + (i+1)*SLICE]
// A seta aponta para ângulo 0
// => qual fatia contém ângulo 0?
// => 0 está em [angle + i*SLICE, angle + (i+1)*SLICE]
// => i = floor((0 - angle) / SLICE) mod N
// => i = floor(-angle / SLICE) mod N
// Simplificado: normaliza (-angle) em [0,2π) e divide por SLICE

var SEGS = [
  {label:'Pergunta\nFácil',      color:'#F47920', type:'facil'},
  {label:'Verdadeiro\nou Falso', color:'#5B9E8A', type:'vf'},
  {label:'Complete\na Frase',    color:'#E8A731', type:'complete'},
  {label:'Tente\nOutra Vez',     color:'#AF6D59', type:'tente'},
  {label:'Pergunta\nFácil',      color:'#F47920', type:'facil'},
  {label:'Verdadeiro\nou Falso', color:'#5B9E8A', type:'vf'},
  {label:'Pergunta\nFácil',      color:'#F47920', type:'facil'},
  {label:'Complete\na Frase',    color:'#E8A731', type:'complete'},
];
var N = SEGS.length;
var SLICE = (2*Math.PI)/N;

var TL = {facil:'Pergunta Fácil', vf:'Verdadeiro ou Falso', complete:'Complete a Frase'};

var Qs = [
  {type:'facil', q:'Qual categoria da CNH o curso da Arauco ajuda a conquistar?', a:'Categoria D', opts:['Categoria A','Categoria B','Categoria D','Categoria E']},
  {type:'facil', q:'O curso oferecido pela Arauco é:', a:'100% gratuito', opts:['Pago','Parcialmente gratuito','100% gratuito']},
  {type:'facil', q:'Quantas oportunidades estão sendo oferecidas?', a:'200', opts:['50','100','200','500']},
  {type:'facil', q:'Qual EPI protege os olhos?', a:'Óculos de segurança', opts:['Luva','Capacete','Óculos de segurança','Botina']},
  {type:'facil', q:'Qual EPI protege a audição?', a:'Protetor auricular', opts:['Protetor auricular','Óculos','Perneira','Luvas']},
  {type:'facil', q:'Para participar é necessário ter:', a:'CNH B ou C', opts:['CNH A','CNH B ou C','CNH E','Não precisa CNH']},
  {type:'facil', q:'O programa é para formação de:', a:'Motoristas', opts:['Mecânicos','Soldadores','Motoristas','Pintores']},
  {type:'facil', q:'Qual a idade mínima para participar?', a:'21 anos', opts:['18 anos','19 anos','21 anos','25 anos']},
  {type:'facil', q:'Em qual estado a CNH deve ser registrada?', a:'MS — Mato Grosso do Sul', opts:['SP','GO','MS','PR']},
  {type:'facil', q:'O que acontece ao finalizar o curso?', a:'Recebe remuneração', opts:['Ganha bicicleta','Recebe remuneração','Ganha capacete','Faz outra prova']},
  {type:'facil', q:'Cite 2 EPIs usados por um motorista de caminhão.', a:'Ex: capacete e botina', opts:[]},
  {type:'facil', q:'O Projeto Sucuriú fica em qual cidade do MS?', a:'Inocência (MS)', opts:[]},
  {type:'vf', q:'"O uso de EPI é obrigatório em áreas operacionais."', a:'Verdadeiro', opts:['Verdadeiro','Falso']},
  {type:'vf', q:'"Posso dirigir caminhão sem treinamento específico."', a:'Falso', opts:['Verdadeiro','Falso']},
  {type:'vf', q:'"Óculos de segurança protegem os olhos."', a:'Verdadeiro', opts:['Verdadeiro','Falso']},
  {type:'vf', q:'"A Arauco está oferecendo qualificação gratuita."', a:'Verdadeiro', opts:['Verdadeiro','Falso']},
  {type:'complete', q:'O EPI que protege a cabeça é o _______.', a:'Capacete', opts:[]},
  {type:'complete', q:'O EPI usado nos pés é a _______.', a:'Botina', opts:[]},
  {type:'complete', q:'A categoria da CNH oferecida pelo programa é a letra _____.', a:'D', opts:[]},
];

var used = {facil:[], vf:[], complete:[]};

function nextQ(type) {
  var pool = [];
  for (var i=0;i<Qs.length;i++) if(Qs[i].type===type) pool.push(i);
  if (!pool.length) return null;
  if (!used[type]) used[type]=[];
  var avail = pool.filter(function(i){return used[type].indexOf(i)===-1;});
  if (!avail.length) { used[type]=[]; avail=pool.slice(); }
  var pick = avail[Math.floor(Math.random()*avail.length)];
  used[type].push(pick);
  return Qs[pick];
}

// ─── ROLETA ──────────────────────────────────────────────────────────────────
var angle=0, spinning=false;

function segAtArrow() {
  // seta à direita = ângulo 0
  // normaliza (0 - angle) em [0, 2π)
  var pos = ((-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  return SEGS[Math.floor(pos/SLICE)%N];
}

function draw() {
  var cv=document.getElementById('wc');
  var ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height,cx=W/2,cy=H/2,r=W/2-8;
  ctx.clearRect(0,0,W,H);
  for(var i=0;i<N;i++){
    var s=angle+i*SLICE, e=angle+(i+1)*SLICE;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=SEGS[i].color;ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+SLICE/2);
    ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='600 11px sans-serif';
    var ls=SEGS[i].label.split('\n');
    for(var j=0;j<ls.length;j++) ctx.fillText(ls[j],r-10,(j-(ls.length-1)/2)*15+4);
    ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,26,0,2*Math.PI);
  ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#F47920';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#F47920';ctx.font='700 9px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('SUCURIÚ',cx,cy);
}

function spin(){
  if(spinning)return;
  spinning=true;
  document.getElementById('sb').disabled=true;
  document.getElementById('ra').innerHTML='';
  var voltas=6+Math.floor(Math.random()*6);
  var extra=Math.random()*2*Math.PI;
  var total=voltas*2*Math.PI+extra;
  var dur=4500,t0=performance.now(),a0=angle;
  function frame(now){
    var t=Math.min((now-t0)/dur,1);
    var ease=1-Math.pow(1-t,4);
    angle=a0+total*ease;
    draw();
    if(t<1){requestAnimationFrame(frame);return;}
    spinning=false;
    document.getElementById('sb').disabled=false;
    showResult(segAtArrow());
  }
  requestAnimationFrame(frame);
}

// ─── RESULTADO ───────────────────────────────────────────────────────────────
function showResult(seg){
  if(seg.type==='tente'){
    document.getElementById('ra').innerHTML=
      '<div style="background:#fdf0ec;border:2px solid #AF6D59;border-radius:10px;padding:24px;text-align:center;margin-top:16px;">'+
      '<div style="font-size:24px;font-weight:700;color:#6a3020;margin-bottom:8px;">Tente Outra Vez!</div>'+
      '<div style="font-size:14px;color:#5a2818;">Não foi dessa vez — gire novamente!</div>'+
      '<br><button class="btn btn-s" style="margin-top:10px;" onclick="clr()">OK</button></div>';
    return;
  }
  var item=nextQ(seg.type);
  if(!item){
    // fallback: pega qualquer tipo disponivel
    item=nextQ('facil');
  }
  if(!item){document.getElementById('ra').innerHTML='<div class="rc"><div class="rq">Sem perguntas disponíveis.</div></div>';return;}

  var h='<div class="rc">'+
    '<div class="tb">'+(TL[item.type]||item.type)+'</div>'+
    '<div class="rq">'+item.q+'</div>';

  if(item.opts&&item.opts.length){
    for(var k=0;k<item.opts.length;k++){
      h+='<button class="ob" onclick="pick(this,\''+esc(item.opts[k])+'\',\''+esc(item.a)+'\')">'+item.opts[k]+'</button>';
    }
    h+='<div class="ab" id="ab">✓ '+item.a+'</div>';
    h+='<div class="bb" id="bb">🎉 Acertou! Pode retirar um brinde!</div>';
  } else {
    h+='<button class="btn btn-s" id="rv" onclick="rev()">Revelar resposta</button>';
    h+='<div class="ab" id="ab">✓ '+item.a+'</div>';
  }
  h+='<div class="nw" id="nw"><button class="btn btn-s" onclick="clr()">Próxima rodada</button></div>';
  h+='</div>';
  document.getElementById('ra').innerHTML=h;
}

function pick(btn,opt,correct){
  var bs=document.querySelectorAll('.ob');
  for(var i=0;i<bs.length;i++){
    bs[i].disabled=true;
    if(bs[i].textContent===correct) bs[i].classList.add('ok');
    else if(bs[i]===btn&&opt!==correct) bs[i].classList.add('no');
  }
  document.getElementById('ab').style.display='block';
  document.getElementById('nw').style.display='block';
  var bb=document.getElementById('bb');
  if(bb) bb.style.display=(opt===correct)?'block':'none';
}

function rev(){
  document.getElementById('ab').style.display='block';
  document.getElementById('nw').style.display='block';
  var rv=document.getElementById('rv');if(rv)rv.style.display='none';
}

function clr(){document.getElementById('ra').innerHTML='';}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

// ─── SETUP ───────────────────────────────────────────────────────────────────
function renderList(){
  var el=document.getElementById('ql'),h='';
  for(var i=0;i<Qs.length;i++){
    var q=Qs[i];
    h+='<div class="qr"><span style="font-size:12px;color:#aaa;min-width:20px;">'+(i+1)+'.</span>'+
      '<div style="flex:1;font-size:13px;color:#2a1a0a;">'+q.q+
      '<br><span class="qa">'+q.a+'</span><span class="qt">'+(TL[q.type]||q.type)+'</span></div></div>';
  }
  el.innerHTML=h;
}

function startWheel(){
  document.getElementById('ss').classList.remove('on');
  document.getElementById('sw').classList.add('on');
  draw();
}

function goSetup(){
  document.getElementById('sw').classList.remove('on');
  document.getElementById('ss').classList.add('on');
}

renderList();
</script>
